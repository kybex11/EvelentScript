id = "evelentscript"
name = "EvelentScript"
version = "1.0.0"
schema_version = 1
authors = []
description = "Syntax highlighting and language support for EvelentScript (.es) files"
repository = "https://github.com/kybex11/evelentscript"

[grammars.evelentscript]
scope = "source.evelentscript"
path = "languages/evelentscript/highlights.scm"

[grammars.literate_evelentscript]
scope = "source.literate-evelentscript"
path = "languages/literate_evelentscript/highlights.scm"

[language_servers]

[text_models]

[slash_commands]

[context_servers]

[agent_servers]

[language_models]

[capabilities]

[debug_adapters]

[themes]

[icon_themes]

[snippets]

[language.evelentscript]
name = "EvelentScript"
grammar = "evelentscript"
tab_size = 2
hard_tabs = false
autoclose_before = ":;,}])>"
 brackets = [
  { start = "(", end = ")", close = true, newline = true },
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]

[language.literate_evelentscript]
name = "Literate EvelentScript"
grammar = "literate_evelentscript"
tab_size = 2
hard_tabs = false

[language.evelentscript.file_types]
"es" = "EvelentScript"

[language.literate_evelentscript.file_types]
"lites" = "Literate EvelentScript"
"es.md" = "Literate EvelentScript"
