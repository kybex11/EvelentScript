<aside id="try" class="try-evelentscript container-fluid" data-example="try">
  <div class="row">
    <div class="col-md-6 code-column bg-ribbed-dark evelentscript-input-column">
      <textarea class="evelentscript-input" id="try-evelentscript-source">alert 'Hello EvelentScript!'</textarea>
    </div>
    <div class="col-md-6 code-column bg-ribbed-dark javascript-output-column">
      <textarea class="javascript-output" id="try-evelentscript-js">alert('Hello EvelentScript!');</textarea>
    </div>
  </div>
  <div class="row">
    <div class="col text-right try-buttons">
      <button type="button" class="btn btn-primary" data-action="run-code-example" data-example="try-evelentscript" data-run="true"><%= include('play.svg') %></button>&emsp;
    </div>
  </div>
</aside>
